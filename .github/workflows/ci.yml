name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug output (RUST_BACKTRACE, RUST_LOG)'
        type: boolean
        default: false

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  # Debug disabled by default - enable via workflow_dispatch with debug_mode=true
  # Note: inputs.debug_mode is only defined for workflow_dispatch, using == true handles undefined case
  RUST_BACKTRACE: ${{ inputs.debug_mode == true && '1' || '0' }}
  RUST_LOG: ${{ inputs.debug_mode == true && 'debug' || '' }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: embeddenator-testkit
    steps:
      - uses: actions/checkout@v6
        with:
          path: embeddenator-testkit

      - name: Clone dependency repos
        working-directory: ${{ github.workspace }}
        run: |
          git clone --depth 1 https://github.com/tzervas/embeddenator-vsa.git
          git clone --depth 1 https://github.com/tzervas/embeddenator-fs.git
          git clone --depth 1 https://github.com/tzervas/embeddenator-retrieval.git
          git clone --depth 1 https://github.com/tzervas/embeddenator-io.git
          git clone --depth 1 https://github.com/tzervas/embeddenator-obs.git
          git clone --depth 1 https://github.com/tzervas/embeddenator-interop.git

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: embeddenator-testkit
          workspaces: embeddenator-testkit

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Run tests (quiet first pass)
        id: test_quiet
        continue-on-error: true
        run: |
          set -o pipefail
          cargo nextest run --no-fail-fast 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Re-run failed tests with debug
        if: steps.test_quiet.outputs.exit_code != '0'
        env:
          RUST_BACKTRACE: full
          RUST_LOG: debug
        run: |
          echo "::group::Re-running failed tests with debug output"
          cargo nextest run --retries 0 --failure-output immediate-final
          echo "::endgroup::"
